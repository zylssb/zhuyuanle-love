<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你喜欢朱元乐吗？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: "Microsoft YaHei", sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-yes {
            background: #4CAF50;
            color: white;
        }

        .btn-yes:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-no {
            background: #f44336;
            color: white;
        }

        .btn-no:hover {
            background: #da190b;
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
            font-size: 24px;
            color: #333;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你是否喜欢朱元乐？</h1>
        <div class="buttons">
            <button class="btn-yes" onclick="answer('yes')">是</button>
            <button class="btn-no" onclick="answer('no')">否</button>
        </div>
        <div class="result" id="result"></div>
    </div>

    <script>
        function answer(choice) {
            const result = document.getElementById('result');
            const buttons = document.querySelector('.buttons');

            if (choice === 'yes') {
                result.textContent = '眼光不错！朱元乐确实很棒！';
                result.style.color = '#4CAF50';
            } else {
                result.textContent = '再想想？朱元乐其实很不错的！';
                result.style.color = '#f44336';
            }

            result.classList.add('show');
            buttons.style.display = 'none';
        }
    </script>
</body>
</html>
